# Hermes config for: coordinator
# Main orchestration profile — runs the full pipeline
# Uses local ds4-server (DeepSeek V4 Flash) at http://127.0.0.1:8000

model:
  provider: custom
  default: deepseek-v4-flash
  base_url: "http://172.17.0.1:8000/v1"
  api_key: "ds4-local"
  context_length: 100000

terminal:
  backend: docker
  docker_image: "nikolaik/python-nodejs:python3.11-nodejs20"
  docker_network: true
  docker_extra_hosts:
    - "host.docker.internal:host-gateway"
  docker_volumes:
    - "/workspace"

compression:
  enabled: true
  threshold: 0.50
  protect_last_n: 20

agent:
  max_turns: 90
  tool_loop_guardrails:
    warnings_enabled: true
    hard_stop_enabled: true

skills:  { write_approval: false }
memory:  { write_approval: false }

cron:
  wrap_response: false
  script_timeout_seconds: 1800
